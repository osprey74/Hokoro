; =====================================================================
;  Hokoro — Atom Matrix Office Status Indicator
;  Target : M5Stack Atom Matrix ESP32 Dev Kit v1.1 (SKU: C008-B-V11)
;  SoC    : ESP32-PICO-D4 / 5x5 WS2812C RGB matrix / programmable button
; =====================================================================

[env]
platform      = espressif32
board         = m5stack-atom
framework     = arduino
monitor_speed = 115200
upload_speed  = 1500000

lib_deps =
    m5stack/M5Atom @ ^0.1.2
    fastled/FastLED @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=2

; --- 設定値はビルドフラグで上書き可能（資格情報はコードに直書きしない） ---
; 例: build_flags = ${env.build_flags} -DWIFI_SSID='"xxxx"' -DWIFI_PASS='"yyyy"'

; --- 実機ビルド（デフォルト） -----------------------------------------
[env:m5stack-atom]
; 共通設定のみを使用

; --- Wokwi シミュレータ用ビルド ---------------------------------------
;   Wi-Fi/NTP/iCal取得をスキップし、ダミーMTG予定(60秒)を注入する。
;   ビルド: pio run -e sim
;   Wokwi: wokwi.toml が .pio/build/sim/firmware.bin を参照
[env:sim]
build_flags =
    ${env.build_flags}
    -DHOKORO_SIM=1
