# =====================================================================
#  Hokoro Cloudflare Worker config
#
#  デプロイ前のセットアップ:
#    1. npm install
#    2. npx wrangler login
#    3. npx wrangler kv namespace create SCHEDULE
#       → 表示された id を下の [[kv_namespaces]] の id に貼り付け
#    4. シークレットを登録 (値はプロンプトで入力):
#         npx wrangler secret put TENANT_ID
#         npx wrangler secret put CLIENT_ID
#         npx wrangler secret put CLIENT_SECRET
#         npx wrangler secret put REFRESH_TOKEN
#         npx wrangler secret put REFRESH_KEY        # 任意 (/refresh で使う)
#    5. デプロイ:
#         npx wrangler deploy
# =====================================================================

name = "hokoro"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace - 上記手順 3 で取得した id を貼る
[[kv_namespaces]]
binding = "SCHEDULE"
id = "a05b6fd29a034680b60f2973f46a4c80"

# Cron triggers - 5分間隔
[triggers]
crons = ["*/5 * * * *"]

# 観察用 (デプロイ後の動作確認):
#   npx wrangler tail        # リアルタイムログ
#   npx wrangler kv key list --binding=SCHEDULE
#   npx wrangler kv key get --binding=SCHEDULE events
